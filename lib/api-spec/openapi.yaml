openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Black Tie VoIP Reseller Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: admin
  - name: resellers
  - name: catalog
  - name: dids
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: registerReseller
      tags: [auth]
      summary: Register a new reseller (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResellerRegisterRequest"
      responses:
        "200":
          description: Registration submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/resellers:
    get:
      operationId: adminGetResellers
      tags: [admin]
      summary: Get all resellers
      responses:
        "200":
          description: List of resellers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reseller"
    post:
      operationId: adminCreateReseller
      tags: [admin]
      summary: Create reseller
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResellerRequest"
      responses:
        "201":
          description: Reseller created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"

  /admin/resellers/{id}:
    get:
      operationId: adminGetReseller
      tags: [admin]
      summary: Get reseller by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reseller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"
    put:
      operationId: adminUpdateReseller
      tags: [admin]
      summary: Update reseller
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResellerRequest"
      responses:
        "200":
          description: Reseller updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"
    delete:
      operationId: adminDeleteReseller
      tags: [admin]
      summary: Delete reseller
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/clients:
    get:
      operationId: adminGetClients
      tags: [admin]
      summary: Get all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"

  # ── Service Catalog ─────────────────────────────────────────────────────────

