    delete:
      operationId: adminDeleteProductCategory
      tags: [catalog]
      summary: Delete product category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/products:
    get:
      operationId: adminGetProducts
      tags: [catalog]
      summary: Get all products
      responses:
