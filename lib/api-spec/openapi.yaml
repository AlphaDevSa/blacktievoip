    put:
      operationId: resellerUpdateProfile
      tags: [resellers]
      summary: Update reseller profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResellerProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"

  /reseller/area-codes:
    get:
      operationId: resellerGetAreaCodes
      tags: [dids]
      summary: Get area codes with available DID counts
      responses:
        "200":
          description: Area codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AreaCodeWithCount"

  /reseller/dids:
    get:
      operationId: resellerGetMyDids
      tags: [dids]
      summary: Get this reseller's assigned DIDs
      responses:
        "200":
          description: DIDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Did"

  /reseller/dids/available:
    get:
      operationId: resellerGetAvailableDids
      tags: [dids]
      summary: Get available DIDs for an area code
      parameters:
        - name: areaCodeId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Available DIDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Did"

  /reseller/dids/{id}/request:
    post:
      operationId: resellerRequestDid
      tags: [dids]
