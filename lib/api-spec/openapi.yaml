    post:
      operationId: adminCreateProductCategory
      tags: [catalog]
      summary: Create product category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/product-categories/{id}:
    put:
      operationId: adminUpdateProductCategory
      tags: [catalog]
      summary: Update product category
      parameters:
        - name: id
