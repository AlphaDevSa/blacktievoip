            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Domain TLDs ───────────────────────────────────────────────────────────────

  /admin/domain-tlds:
    get:
      operationId: adminGetDomainTlds
      tags: [catalog]
      summary: Get all domain TLDs
      responses:
        "200":
          description: List of domain TLDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainTld"
    post:
      operationId: adminCreateDomainTld
      tags: [catalog]
      summary: Create domain TLD
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDomainTldRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainTld"

  /admin/domain-tlds/{id}:
    put:
      operationId: adminUpdateDomainTld
      tags: [catalog]
      summary: Update domain TLD
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDomainTldRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainTld"
    delete:
      operationId: adminDeleteDomainTld
      tags: [catalog]
      summary: Delete domain TLD
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /catalog/domain-tlds:
    get:
      operationId: getCatalogDomainTlds
      tags: [catalog]
      summary: Get active domain TLDs (reseller view)
      responses:
        "200":
          description: List of active domain TLDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainTld"

  # ── Domain Check ──────────────────────────────────────────────────────────────

  /reseller/check-domain:
    get:
      operationId: resellerCheckDomain
      tags: [reseller]
      summary: Check domain availability via RDAP
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainCheckResult"

  # ── DID Manager ──────────────────────────────────────────────────────────────

  /admin/area-codes:
    get:
      operationId: adminGetAreaCodes
      tags: [dids]
      summary: Get all area codes
      responses:
        "200":
          description: List of area codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AreaCode"
    post:
      operationId: adminCreateAreaCode
      tags: [dids]
      summary: Create area code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAreaCodeRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaCode"

  /admin/area-codes/{id}:
    put:
      operationId: adminUpdateAreaCode
      tags: [dids]
      summary: Update area code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAreaCodeRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaCode"
    delete:
      operationId: adminDeleteAreaCode
      tags: [dids]
      summary: Delete area code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/dids:
    get:
      operationId: adminGetDids
      tags: [dids]
      summary: Get all DIDs with filters
      parameters:
        - name: areaCodeId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: resellerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of DIDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Did"
    post:
      operationId: adminCreateDid
      tags: [dids]
      summary: Create DID number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDidRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Did"

  /admin/dids/bulk:
    post:
      operationId: adminBulkCreateDids
      tags: [dids]
      summary: Bulk create DID numbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateDidsRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/dids/{id}:
    put:
      operationId: adminUpdateDid
      tags: [dids]
      summary: Update DID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDidRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Did"
    delete:
      operationId: adminDeleteDid
      tags: [dids]
      summary: Delete DID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/dids/{id}/assign:
    post:
      operationId: adminAssignDid
      tags: [dids]
      summary: Assign DID to reseller
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignDidRequest"
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Did"

  /admin/dids/{id}/unassign:
    post:
      operationId: adminUnassignDid
      tags: [dids]
      summary: Unassign DID from reseller
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Did"

  # ── Reseller endpoints ────────────────────────────────────────────────────────

  /reseller/clients:
