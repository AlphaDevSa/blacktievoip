components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, reseller]
      required: [email, password, role]

    ResellerRegisterRequest:
      type: object
      properties:
        companyName:
          type: string
        contactName:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
      required: [companyName, contactName, email, password]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        role:
          type: string
          enum: [admin, reseller]
        user:
          $ref: "#/components/schemas/CurrentUser"
      required: [success, role, user]

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, reseller]
      required: [id, email, name, role]

