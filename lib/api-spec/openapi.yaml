  /reseller/stats:
    get:
      operationId: resellerGetStats
      tags: [resellers]
      summary: Get reseller dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResellerStats"

  /reseller/profile:
    get:
      operationId: resellerGetProfile
      tags: [resellers]
      summary: Get reseller profile
      responses:
        "200":
          description: Profile
          content:
