          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: adminDeleteProduct
      tags: [catalog]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Web Hosting Packages ─────────────────────────────────────────────────────

  /admin/hosting-packages:
    get:
      operationId: adminGetHostingPackages
      tags: [catalog]
      summary: Get all hosting packages
      responses:
        "200":
          description: List of hosting packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HostingPackage"
    post:
      operationId: adminCreateHostingPackage
      tags: [catalog]
      summary: Create hosting package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHostingPackageRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostingPackage"

  /admin/hosting-packages/{id}:
    put:
      operationId: adminUpdateHostingPackage
      tags: [catalog]
      summary: Update hosting package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHostingPackageRequest"
      responses:
