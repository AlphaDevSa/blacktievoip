          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostingPackage"
    delete:
      operationId: adminDeleteHostingPackage
      tags: [catalog]
      summary: Delete hosting package
      parameters:
        - name: id
          in: path
          required: true
